<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Chatbot UI</title>
    <!-- Load Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar styling for a cleaner look in the dark theme */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #1f2937; /* Gray-800 */
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: #4b5563; /* Gray-600 */
            border-radius: 4px;
        }
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background-color: #6b7280; /* Gray-500 */
        }

        /* Set the Inter font as default */
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#6366f1', // Indigo-500
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex items-center justify-center p-4">

    <!-- Chat Application Container -->
    <div id="chat-app" class="w-full max-w-lg h-full max-h-[90vh] flex flex-col bg-gray-800 rounded-xl shadow-2xl overflow-hidden">

        <!-- Header -->
        <header class="p-4 bg-gray-900 border-b border-gray-700 flex items-center justify-between">
            <h1 class="text-xl font-bold text-white">Gemini Chat</h1>
            <div class="text-sm text-gray-400">Online</div>
        </header>

        <!-- Messages Area -->
        <div id="chat-messages" class="chat-messages flex-1 overflow-y-auto p-4 space-y-4">
            <!-- Initial Bot Message - Now includes Avatar -->
            <div class="flex justify-start items-end space-x-2">
                <!-- Bot Avatar -->
                <div class="flex-shrink-0 w-8 h-8 bg-primary rounded-full flex items-center justify-center font-bold text-xs text-white shadow-lg">G</div>
                <!-- Message Bubble -->
                <div class="bg-gray-700 text-white p-3 rounded-xl rounded-tl-none max-w-xs md:max-w-md shadow-md">
                    Hello! I'm your AI assistant. Type a message below to start our conversation.
                </div>
            </div>
            <!-- Messages will be appended here -->
        </div>

        <!-- Input Form -->
        <form id="chat-form" class="p-4 bg-gray-900 border-t border-gray-700 flex space-x-3">
            <input
                type="text"
                id="message-input"
                placeholder="Type your message..."
                class="flex-1 p-3 bg-gray-700 border border-gray-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary text-white placeholder-gray-400 transition"
                autocomplete="off"
                required
            >
            <button
                type="submit"
                class="bg-primary text-white p-3 rounded-xl font-semibold hover:bg-indigo-600 transition duration-150 active:scale-[0.98] shadow-lg shadow-primary/30"
            >
                Send
            </button>
        </form>
    </div>

    <script>
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const chatMessages = document.getElementById('chat-messages');

        /**
         * Scrolls the messages container to the bottom.
         */
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        /**
         * Creates and appends a message bubble to the chat container.
         * @param {string} text - The content of the message.
         * @param {string} sender - 'user' or 'bot'.
         */
        function createMessageBubble(text, sender) {
            const messageWrapper = document.createElement('div');
            const messageBubble = document.createElement('div');
            const avatar = document.createElement('div');

            // Determine if it's user or bot
            const isUser = sender === 'user';

            // Set wrapper class for alignment, spacing, and vertical alignment (items-end for better look)
            messageWrapper.className = isUser ? 'flex justify-end items-end space-x-2' : 'flex justify-start items-end space-x-2';

            // --- Create Avatar Element ---
            avatar.className = 'flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs shadow-lg';
            if (isUser) {
                // User Avatar (Grey background, 'U')
                avatar.classList.add('bg-gray-700', 'text-white');
                avatar.textContent = 'U';
            } else {
                // Bot Avatar (Primary color, 'G')
                avatar.classList.add('bg-primary', 'text-white');
                avatar.textContent = 'G';
            }

            // --- Create Message Bubble Element ---
            messageBubble.classList.add('p-3', 'rounded-xl', 'max-w-xs', 'md:max-w-md', 'shadow-md');
            if (isUser) {
                // User message (Primary color, break bottom-right corner)
                messageBubble.classList.add('bg-primary', 'text-white', 'rounded-br-none');
            } else {
                // Bot message (Secondary color, break top-left corner)
                messageBubble.classList.add('bg-gray-700', 'text-white', 'rounded-tl-none');
            }

            messageBubble.textContent = text;

            // Order of elements depends on the sender (Avatar is always on the outside edge)
            if (isUser) {
                messageWrapper.appendChild(messageBubble);
                messageWrapper.appendChild(avatar);
            } else {
                messageWrapper.appendChild(avatar);
                messageWrapper.appendChild(messageBubble);
            }

            chatMessages.appendChild(messageWrapper);
            scrollToBottom();
        }

        /**
         * Simulates a bot response with a slight delay.
         * @param {string} userMessage - The message the user sent.
         */
        function simulateBotResponse(userMessage) {
            // A simple set of canned responses based on the user's message
            let botText = "Thank you for reaching out! I'm processing your request now. The avatars definitely make the conversation easier to follow!";

            if (userMessage.toLowerCase().includes('hello') || userMessage.toLowerCase().includes('hi')) {
                botText = "Hello there! How can I assist you today? I notice the new avatars!";
            } else if (userMessage.toLowerCase().includes('ui') || userMessage.toLowerCase().includes('interface')) {
                botText = "I think this chat UI looks great! It's fully responsive, too, and the avatars add clarity.";
            } else if (userMessage.length < 5) {
                 botText = "That's a short one! Can you tell me more?";
            }

            // Show a "typing" indicator temporarily (optional, but good UX)
            // Note: We skip the typing indicator for this simple example, but you'd place it here.

            setTimeout(() => {
                createMessageBubble(botText, 'bot');
            }, 800); // 800ms delay for a conversational feel
        }

        // Event listener for form submission
        chatForm.addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent page reload

            const userMessage = messageInput.value.trim();

            if (userMessage) {
                // 1. Display user message
                createMessageBubble(userMessage, 'user');

                // 2. Simulate bot response
                simulateBotResponse(userMessage);

                // 3. Clear the input field
                messageInput.value = '';
            }
        });

        // Ensure the initial chat history scrolls to bottom on load
        window.onload = scrollToBottom;
    </script>
</body>
</html>
